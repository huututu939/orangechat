<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>音乐工作室</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Noto Serif SC','Songti SC',serif;background:#1a1814;color:#d4c4a8;-webkit-font-smoothing:antialiased}

/* === Top bar (fixed top) === */
.top{position:fixed;top:0;left:0;right:0;z-index:10;padding:12px 16px;padding-top:calc(12px + var(--safe-top));background:#1a1814;border-bottom:1px solid #2e2924;display:flex;align-items:center;justify-content:space-between;gap:10px}
.top h1{font-size:15px;font-weight:700;color:#e8d5b5;letter-spacing:0.5px}
.top .sub{font-size:9px;color:#6b5d4d;margin-top:1px}
.top-right{display:flex;gap:7px}
.icon-btn{width:34px;height:34px;border-radius:10px;border:1px solid #332e28;background:#2a2520;color:#8b7355;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
.icon-btn:active{background:#3d362e;color:#c9a87c}
.icon-btn.active{background:linear-gradient(135deg,#8b6e4e,#6b5238);color:#f5e6cc;border-color:transparent}

/* === Chat area (fixed middle) === */
.chat{position:fixed;top:60px;top:calc(60px + var(--safe-top));bottom:56px;bottom:calc(56px + var(--safe-bottom));left:0;right:0;overflow-y:auto;padding:14px 14px 20px;-webkit-overflow-scrolling:touch}
.chat::-webkit-scrollbar{width:0}

.msg{display:flex;flex-direction:column;max-width:82%;margin-bottom:12px}
.msg.u{align-self:flex-end;align-items:flex-end}
.msg.a{align-self:flex-start;align-items:flex-start}
.msg-b{padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.6;word-break:break-word;white-space:pre-wrap}
.msg.u .msg-b{background:linear-gradient(135deg,#8b6e4e,#6b5238);color:#f5e6cc;border-bottom-right-radius:4px}
.msg.a .msg-b{background:#2a2520;border:1px solid #332e28;color:#d4c4a8;border-bottom-left-radius:4px}
.msg-t{font-size:9px;color:#5a4d3e;padding:2px 4px;margin-top:3px}
.msg.u .msg-t{text-align:right}

.typing{display:inline-flex;gap:4px;padding:2px 0}
.typing span{width:5px;height:5px;border-radius:50%;background:#6b5d4d;animation:tp 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes tp{0%,60%,100%{opacity:.3;transform:scale(.8)}30%{opacity:1;transform:scale(1)}}

/* === Bottom bar (fixed bottom) === */
.bottom{position:fixed;bottom:0;left:0;right:0;z-index:10;padding:8px 12px;padding-bottom:calc(8px + var(--safe-bottom));background:#1a1814;border-top:1px solid #2e2924;display:flex;gap:8px;align-items:flex-end}
.input-area{flex:1;display:flex;gap:6px;align-items:flex-end;background:#2a2520;border:1px solid #332e28;border-radius:22px;padding:4px 4px 4px 14px}
.input-area textarea{flex:1;min-height:32px;max-height:100px;padding:7px 0;border:none;background:transparent;color:#d4c4a8;font-size:13px;font-family:inherit;resize:none;outline:none;line-height:1.4}
.input-area textarea::placeholder{color:#5a4d3e}
.send-btn{width:32px;height:32px;border:none;background:#8b6e4e;color:#f5e6cc;font-size:15px;border-radius:50%;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:transform .1s}
.send-btn:active{transform:scale(.9)}
.gen-btn{padding:8px 14px;border-radius:22px;border:none;background:linear-gradient(135deg,#8b6e4e,#6b5238);color:#f5e6cc;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;transition:transform .1s;display:flex;align-items:center;gap:4px}
.gen-btn:active{transform:scale(.95)}
.gen-btn:disabled{opacity:.5}

/* === Library panel (slide up) === */
.lib-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;z-index:40}
.lib-bg.show{display:block}
.lib{position:fixed;top:0;left:0;right:0;bottom:0;z-index:41;background:#1a1814;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.lib.show{transform:translateY(0)}
.lib-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;padding-top:calc(12px + var(--safe-top));border-bottom:1px solid #2e2924;flex-shrink:0}
.lib-head h2{font-size:15px;font-weight:700;color:#e8d5b5}
.lib-body{flex:1;overflow-y:auto;padding:12px 14px}
.lib-body::-webkit-scrollbar{width:0}

.card{background:#2a2520;border:1px solid #332e28;border-radius:14px;padding:13px;margin-bottom:10px}
.card-top{display:flex;align-items:flex-start;gap:9px}
.card-icon{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,#3d362e,#2a2520);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.card-info{flex:1;min-width:0}
.card-title{font-size:13px;font-weight:700;color:#e8d5b5;margin-bottom:3px;word-break:break-all}
.card-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.tag-style{font-size:9px;color:#8b7355;background:rgba(139,115,85,.15);padding:1px 7px;border-radius:7px}
.tag-voice{font-size:9px;color:#c9a87c;background:rgba(201,168,124,.1);padding:1px 6px;border-radius:6px;border:1px solid rgba(201,168,124,.2)}
.tag-date{font-size:9px;color:#5a4d3e}
.card-btns{display:flex;gap:7px;margin-top:9px}
.btn-play{flex:1;padding:7px;border-radius:9px;border:1px solid #3d362e;background:rgba(139,115,85,.08);color:#c9b896;font-size:11px;cursor:pointer;font-family:inherit;transition:all .12s}
.btn-play:active{background:rgba(139,115,85,.2)}
.btn-play.on{background:linear-gradient(135deg,#8b6e4e,#6b5238);color:#f5e6cc;border-color:transparent}
.btn-del{width:32px;border-radius:9px;border:1px solid #3d362e;background:transparent;color:#5a4d3e;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.btn-del:active{color:#c45050;border-color:#5a3a3a}

.empty{text-align:center;padding:50px 20px}
.empty-icon{font-size:36px;opacity:.35;margin-bottom:10px}
.empty-text{font-size:12px;color:#5a4d3e;margin-bottom:3px}
.empty-hint{font-size:10px;color:#3d362e}

/* === Loading overlay === */
.loading{position:fixed;inset:0;background:rgba(26,24,20,.95);display:none;align-items:center;justify-content:center;z-index:100;flex-direction:column;gap:14px}
.loading.show{display:flex}
.spinner{width:38px;height:38px;border:3px solid #3d362e;border-top-color:#8b7355;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-timer{font-size:32px;font-weight:700;color:#e8d5b5;font-variant-numeric:tabular-nums;letter-spacing:2px;line-height:1}
.loading-text{font-size:13px;color:#d4c4a8;text-align:center;max-width:260px;line-height:1.6}
.loading-stage{font-size:11px;color:#8b7355;min-height:16px}
.loading-bar{width:200px;height:3px;background:#3d362e;border-radius:2px;overflow:hidden}
.loading-bar::after{content:'';display:block;width:35%;height:100%;background:linear-gradient(90deg,transparent,#8b6e4e,transparent);animation:slide 1.5s linear infinite}
@keyframes slide{0%{transform:translateX(-100%)}100%{transform:translateX(360%)}}
.loading-sub{font-size:10px;color:#6b5d4d}

/* === Toast === */
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#2a2520;color:#d4c4a8;padding:8px 18px;border-radius:20px;font-size:11px;border:1px solid #3d362e;display:none;z-index:60;white-space:nowrap;max-width:90%;overflow:hidden;text-overflow:ellipsis}
</style>
</head>
<body>

<!-- Top -->
<div class="top">
  <div>
    <h1>🎸 音乐工作室</h1>
    <div class="sub" id="topSub">和 AI 聊聊你的创作想法</div>
  </div>
  <div class="top-right">
    <button class="icon-btn" onclick="toggleLib()" title="音乐库">📂</button>
  </div>
</div>

<!-- Chat -->
<div class="chat" id="chatList"></div>

<!-- Bottom input -->
<div class="bottom">
  <div class="input-area">
    <textarea id="chatInput" placeholder="和 AI 聊聊歌词、风格..." rows="1"></textarea>
    <button class="send-btn" onclick="sendMsg()">↑</button>
  </div>
  <button class="gen-btn" id="genBtn" onclick="generateFromChat()">🎵 生成</button>
</div>

<!-- Library -->
<div class="lib-bg" id="libBg" onclick="toggleLib()"></div>
<div class="lib" id="libPanel">
  <div class="lib-head">
    <h2>📂 音乐库</h2>
    <button class="icon-btn" onclick="toggleLib()">✕</button>
  </div>
  <div class="lib-body" id="libBody"></div>
</div>

<!-- Loading -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-timer" id="loadTimer">00:00</div>
  <div class="loading-text" id="loadText">正在生成歌曲...</div>
  <div class="loading-stage" id="loadStage">⏳ 努力中</div>
  <div class="loading-bar"></div>
  <div class="loading-sub" id="loadSub">需要 3-8 分钟，请耐心等待</div>
</div>

<div id="toast" class="toast"></div>

<script>
var songs=[];
var curPlay=null;
var isGenerating=false;

function toast(m){var t=document.getElementById('toast');t.textContent=m;t.style.display='block';clearTimeout(t._tm);t._tm=setTimeout(function(){t.style.display='none'},3000)}
function esc(s){return String(s||'').replace(/&/g,'&').replace(/</g,'<').replace(/>/g,'>')}
function fmtTime(iso){try{var d=new Date(iso);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}catch(e){return''}}
function fmtDate(iso){if(!iso)return'';try{var d=new Date(iso);return(d.getMonth()+1)+'/'+d.getDate()+' '+fmtTime(iso)}catch(e){return''}}

function waitBridge(cb){var s=Date.now();(function w(){if(window.Bridge)return cb();if(Date.now()-s>3000){cb();return}setTimeout(w,100)})()}

// ==================== Chat ====================

function addMsg(text,isUser){
  var ms=document.getElementById('chatList');
  var d=document.createElement('div');
  d.className='msg '+(isUser?'u':'a');
  d.innerHTML='<div class="msg-b">'+esc(text)+'</div><div class="m-t">'+fmtTime(new Date().toISOString())+'</div>';
  ms.appendChild(d);
  ms.scrollTop=ms.scrollHeight;
}

function addTyping(){
  var ms=document.getElementById('chatList');
  var d=document.createElement('div');
  d.className='msg a';d.id='typM';
  d.innerHTML='<div class="msg-b"><div class="typing"><span></span><span></span><span></span></div></div>';
  ms.appendChild(d);
  ms.scrollTop=ms.scrollHeight;
}
function rmTyping(){var e=document.getElementById('typM');if(e)e.remove()}

async function sendMsg(){
  var inp=document.getElementById('chatInput');
  var t=inp.value.trim();
  if(!t||isGenerating)return;
  inp.value='';inp.style.height='auto';
  addMsg(t,true);
  addTyping();
  try{
    var r=await Bridge.callAI(t,'music_studio');
    rmTyping();
    if(r&&r.success&&r.text)addMsg(r.text,false);
    else addMsg('AI 暂时无法回复，请稍后再试',false);
  }catch(e){
    rmTyping();
    addMsg('连接失败: '+e.message,false);
  }
}

// Auto-resize textarea
document.getElementById('chatInput').addEventListener('input',function(){
  this.style.height='auto';
  this.style.height=Math.min(this.scrollHeight,100)+'px';
});
document.getElementById('chatInput').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg()}
});

// ==================== Generate from chat ====================

async function generateFromChat(){
  if(isGenerating){toast('正在生成中，请等待...');return}
  var genBtn=document.getElementById('genBtn');
  genBtn.disabled=true;

  showLoading('正在整理歌词...','让 AI 从对话中提取歌词和风格',['🧠 AI 正在理解你的想法...','✍️ 正在编排歌词和结构...','🎵 挑选合适的音乐风格...']);
  addTyping();

  try{
    // Step 1: Ask AI to extract lyrics from conversation
    var extractPrompt='基于我们之前的对话，请整理出完整的歌曲信息，用纯JSON格式返回（不要markdown，不要多余文字）：\n{"title":"歌曲名","lyrics":"完整歌词","style":"风格描述"}\n\n歌词请保留[Verse][Chorus]等段落标签。';
    var r=await Bridge.callAI(extractPrompt,'music_studio');

    rmTyping();

    if(!r||!r.success||!r.text){
      hideLoading();
      genBtn.disabled=false;
      toast('提取歌词失败');
      return;
    }

    // Parse JSON from AI response
    var parsed=parseJSON(r.text);
    if(!parsed||!parsed.lyrics){
      hideLoading();
      genBtn.disabled=false;
      toast('无法解析歌词，请继续对话后再试');
      addMsg('⚠️ 未能提取出完整的歌词信息，请告诉我更多细节（歌词、风格等）',false);
      return;
    }

    addMsg('📝 已整理好歌词，开始生成歌曲...',false);

    // Step 2: Generate song
    isGenerating=true;
    showLoading('🎵 正在生成歌曲...','Suno 生成 + 音色替换（约3-8分钟）',['🎸 Suno 正在作曲和编曲...','🎤 AI 歌手正在演唱你的歌词...','🎵 正在混音和后期处理...','🎙️ 正在替换为专属音色...','✨ 最后润色中，马上就好...','⏳ 快完成了，再等一会儿...']);

    var params={
      title:parsed.title||('歌曲'+Date.now()),
      lyrics:parsed.lyrics,
    };
    if(parsed.style)params.style=parsed.style;

    var result=await Bridge.callTool('generate_song',JSON.stringify(params));

    hideLoading();
    genBtn.disabled=false;
    isGenerating=false;

    if(result&&result.success){
      addMsg('🎵 '+(result.data.message||'歌曲已生成！'),false);
      toast('✅ 歌曲已生成');
      loadLib();
    }else{
      addMsg('❌ '+(result.error||'生成失败'),false);
      toast('❌ 生成失败');
    }
  }catch(e){
    rmTyping();
    hideLoading();
    genBtn.disabled=false;
    isGenerating=false;
    toast('❌ '+e.message);
  }
}

function parseJSON(text){
  if(!text)return null;
  try{return JSON.parse(text)}catch(e){}
  // Try to extract JSON from text
  var m=text.match(/\{[\s\S]*\}/);
  if(m){try{return JSON.parse(m[0])}catch(e2){}}
  return null;
}

// ==================== Loading (实时计时 + 阶段轮换) ====================

var _loadStartTime=null,_loadTimerInt=null,_loadStages=['⏳ 努力中'],_loadStageIdx=0;
function showLoading(t,sub,stageHints){
  document.getElementById('loadText').textContent=t||'正在生成...';
  document.getElementById('loadSub').textContent=sub||'';
  document.getElementById('loading').classList.add('show');
  _loadStartTime=Date.now();
  _loadStages=(stageHints&&stageHints.length)?stageHints:['⏳ 努力中'];
  _loadStageIdx=0;
  document.getElementById('loadStage').textContent=_loadStages[0];
  document.getElementById('loadTimer').textContent='00:00';
  if(_loadTimerInt)clearInterval(_loadTimerInt);
  _loadTimerInt=setInterval(function(){
    var el=Math.floor((Date.now()-_loadStartTime)/1000);
    var m=Math.floor(el/60),s=el%60;
    document.getElementById('loadTimer').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    var idx=Math.min(Math.floor(el/15),_loadStages.length-1);
    if(idx!==_loadStageIdx){_loadStageIdx=idx;document.getElementById('loadStage').textContent=_loadStages[idx]}
  },1000);
}
function hideLoading(){
  document.getElementById('loading').classList.remove('show');
  if(_loadTimerInt){clearInterval(_loadTimerInt);_loadTimerInt=null}
}

// ==================== Library ====================

function toggleLib(){
  var p=document.getElementById('libPanel');
  var b=document.getElementById('libBg');
  if(p.classList.contains('show')){
    p.classList.remove('show');b.classList.remove('show');
  }else{
    loadLib();
    p.classList.add('show');b.classList.add('show');
  }
}

async function loadLib(){
  try{
    var v=await Bridge.getData('studio_song_list');
    songs=v?JSON.parse(v):[];
  }catch(e){songs=[]}
  renderLib();
}

function renderLib(){
  var el=document.getElementById('libBody');
  if(!songs.length){
    el.innerHTML='<div class="empty"><div class="empty-icon">📂</div><div class="empty-text">还没有作品</div><div class="empty-hint">和 AI 聊聊，然后点击生成</div></div>';
    return;
  }
  var h='';
  for(var i=0;i<songs.length;i++){
    var s=songs[i];
    var on=curPlay===s.id;
    h+='<div class="card">';
    h+='<div class="card-top">';
    h+='<div class="card-icon">'+(on?'♪':'♫')+'</div>';
    h+='<div class="card-info">';
    h+='<div class="card-title">'+esc(s.title)+'</div>';
    h+='<div class="card-meta">';
    if(s.style)h+='<span class="tag-style">'+esc(s.style)+'</span>';
    if(s.hasVoiceReplacement)h+='<span class="tag-voice">🎙️音色</span>';
    h+='<span class="tag-date">'+fmtDate(s.createdAt)+'</span>';
    h+='</div></div></div>';
    h+='<div class="card-btns">';
    h+='<button class="btn-play'+(on?' on':'')+'" onclick="playSong('+i+')">'+(on?'❚❚ 播放中':'▶ 播放')+'</button>';
    h+='<button class="btn-del" onclick="delSong('+i+')">✕</button>';
    h+='</div></div>';
  }
  el.innerHTML=h;
}

async function playSong(i){
  if(i<0||i>=songs.length)return;
  var s=songs[i];
  if(curPlay===s.id){
    try{await Bridge.musicStop()}catch(e){}
    curPlay=null;renderLib();return;
  }
  var url=s.finalUrl||s.originalUrl;
  if(!url){toast('无音频链接');return}
  try{
    await Bridge.musicPlay(url,s.title,s.style||'AI 创作');
    curPlay=s.id;renderLib();
    toast('播放: '+s.title);
  }catch(e){toast('播放失败')}
}

async function delSong(i){
  if(i<0||i>=songs.length)return;
  var s=songs[i];
  if(!confirm('删除「'+s.title+'」？'))return;
  try{
    await Bridge.callTool('delete_studio_song',JSON.stringify({title:s.title}));
    toast('已删除');loadLib();
  }catch(e){toast('删除失败')}
}

// ==================== Init ====================

waitBridge(function(){
  loadLib();
  // Welcome message
  setTimeout(function(){
    addMsg('🎸 欢迎来到音乐工作室！\n\n和我聊聊你想创作什么样的歌曲吧——歌词主题、音乐风格、情绪氛围都可以。聊得差不多了，点击右下角「🎵 生成」按钮，我就帮你把想法变成完整的歌曲！',false);
  },500);
});
</script>
</body>
</html>
